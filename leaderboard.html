<!DOCTYPE html>
<html>
<head>
    <title>Leaderboard</title>
</head>
<body>

<h1>Leaderboard</h1>

<table border="1">

<tr>
    <th>Name</th>
    <th>Score</th>
</tr>

{% for row in data %}

<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
